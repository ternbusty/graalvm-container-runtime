version: 2

updates:
  # Java / Gradle dependencies (picocli, jackson, junit, mockito, ...).
  # Patch / minor / major updates land as separate PRs labelled "deps" so
  # release-please routes them into the 🔗 Dependencies changelog section.
  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps
      include: scope

  # GitHub Actions used in the workflows (checkout, setup-graalvm, ...).
  # Action updates often carry node-version or security fixes; keep them
  # fresh without manual auditing.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
      include: scope
